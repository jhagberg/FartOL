# Pre-commit hooks (D-08). Runs lint + format on staged files; commitlint on commit-msg.
# Glob limited to source/text formats we actually lint or format.

pre-commit:
  parallel: true
  commands:
    prettier:
      glob: '*.{ts,js,cjs,mjs,json,md,yml,yaml}'
      run: pnpm exec prettier --check {staged_files}
    eslint:
      glob: '*.{ts,js,cjs,mjs}'
      run: pnpm exec eslint {staged_files}

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
