name: ci
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      # Codex review #9: pnpm pinning via Corepack. Corepack reads the root
      # package.json `packageManager` field (set to pnpm@10.30.3 in Task 1)
      # and activates that exact version. No GHA context-variable substitution
      # required, and the runner pnpm version can never drift from the
      # lockfile's pnpm version.
      - name: Enable Corepack (pins pnpm from package.json `packageManager`)
        run: corepack enable && corepack prepare --activate
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build cross-workspace type deps before typecheck.
      # @fartol/shared-types imports from @fartol/sportident which
      # publishes types via package.json `exports → ./dist/index.d.ts`.
      # A fresh CI checkout has no dist/, so typecheck must run after
      # at least sportident has been built. Apps consume the same
      # surface via the workspace dep — building sportident here also
      # stabilises their typecheck.
      - run: pnpm --filter @fartol/sportident build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
