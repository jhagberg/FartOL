# Manual workflow: build the fartOLa tarball and run install-smoke against it.
# Triggers ONLY on workflow_dispatch — Phase 1 distributes tarballs to a
# known operator set (Jonas + StorTuna). Phase 2 will move to a release-
# triggered publish + provenance signing when REQ-OPS-001 widens to a
# broader audience.
#
# Locked by .planning/phases/01-single-laptop-training-mvp/01-18-PLAN.md task 2.

name: build-fartola
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Enable Corepack (pins pnpm from package.json packageManager)
        run: corepack enable && corepack prepare --activate
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - name: Build tarball
        run: bash scripts/build-fartola.sh
      - name: Run install-smoke against the built tarball
        run: bash apps/edge/scripts/install-smoke.sh dist/fartola-*.tgz
      - name: Run C-H4 layout regression test
        run: pnpm test:install
      - uses: actions/upload-artifact@v7
        with:
          name: fartola-tarball
          path: dist/fartola-*.tgz
