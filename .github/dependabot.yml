# Dependabot configuration for fartOLa.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Weekly cadence on Monday morning. pnpm via `package-ecosystem: npm` —
# Dependabot reads pnpm-lock.yaml natively. GitHub Actions workflow
# files are also watched so action SHAs stay current.

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Stockholm
    open-pull-requests-limit: 10
    groups:
      # Bundle minor + patch bumps into one PR to keep the review load
      # manageable. Majors stay separate so they get a focused review.
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps)'
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Stockholm
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: 'chore(ci-deps)'
      include: scope
